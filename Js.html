
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple JavaScript Calendar</title>
  <style>
    /* Basic styling for the calendar */
    .calendar { width: 300px; margin: 20px auto; border: 1px solid #ccc; }
    .calendar-header { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #f2f2f2; }
    .calendar-body { padding: 10px; }
    .calendar-weekdays, .calendar-dates { display: grid; grid-template-columns: repeat(7, 1fr); }
    .calendar-weekdays div { font-weight: bold; text-align: center; }
    .calendar-dates div { text-align: center; padding: 5px 0; }
    .today { background: #007bff; color: white; border-radius: 50%; }
  </style>
</head>
<body>
  <div class="calendar">
    <div class="calendar-header">
      <button id="prev-month">&lt;</button>
      <div id="month-year"></div>
      <button id="next-month">&gt;</button>
    </div>
    <div class="calendar-body">
      <div class="calendar-weekdays">
        <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
      </div>
      <div class="calendar-dates"></div>
    </div>
  </div>

  <script>

const calendarDates = document.querySelector('.calendar-dates');
const monthYear = document.getElementById('month-year');
const prevMonthBtn = document.getElementById('prev-month');
const nextMonthBtn = document.getElementById('next-month');
let currentDate = new Date();
let currentMonth = currentDate.getMonth();
let currentYear = currentDate.getFullYear();
const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

function renderCalendar(month, year) {
  calendarDates.innerHTML = '';
  monthYear.textContent = `${months[month]} ${year}`;
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  // Blank days before the 1st
  for (let i = 0; i < firstDay; i++) {
    const blank = document.createElement('div');
    calendarDates.appendChild(blank);
  }

  // Days of the month
  for (let i = 1; i <= daysInMonth; i++) {
    const day = document.createElement('div');
    day.textContent = i;
    if (
      i === currentDate.getDate() &&
      month === currentDate.getMonth() &&
      year === currentDate.getFullYear()
    ) {
      day.classList.add('today');
    }
    calendarDates.appendChild(day);
  }
}

// Navigation
prevMonthBtn.onclick = function() {
  currentMonth--;
  if (currentMonth < 0) {
    currentMonth = 11;
    currentYear--;
  }
  renderCalendar(currentMonth, currentYear);
};
nextMonthBtn.onclick = function() {
  currentMonth++;
  if (currentMonth > 11) {
    currentMonth = 0;
    currentYear++;
  }
  renderCalendar(currentMonth, currentYear);
};

// Initial render
renderCalendar(currentMonth, currentYear);


    // JavaScript code will go here
  </script>
</body>
</html>
